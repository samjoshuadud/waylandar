name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Ruff Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for hardcoded paths cuz im stupd
        run: |
          echo "Scanning codebase for hardcoded absolute paths..."
          if grep -rn "/home/" --include=\*.{py,qml} .; then
            echo "ERROR: Hardcoded '/home/' paths found! Please use Quickshell.env(\"HOME\") or os.path.expanduser(\"~\") instead."
            exit 1
          else
            echo "No hardcoded paths found."
          fi

      - name: Run Ruff
        uses: astral-sh/ruff-action@v1

  security:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/secrets

  nix-build:
    name: Nix Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Build Flake
        run: nix build .#default


